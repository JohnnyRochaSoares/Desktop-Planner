name: Build Desktop
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --icon="assets/Desktop.ico" --add-data "assets;assets" --name=Desktop-Windows src/desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/Desktop-Windows.exe
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --icon="assets/Desktop.ico" --add-data "assets:assets" --name=Desktop-Linux src/desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/Desktop-Linux
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install pyinstaller pillow
      - run: pyinstaller --onefile --windowed --add-data "assets:assets" --name=Desktop-macOS src/desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/Desktop-macOS
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Artifacts
        run: |
          gh release upload ${{ github.ref_name }} artifacts/windows/* artifacts/linux/* artifacts/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
